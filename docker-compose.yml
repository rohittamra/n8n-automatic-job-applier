version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: jobs_postgres
    restart: always
    environment:
      POSTGRES_DB: jobs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: jobs_backend
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  n8n:
    image: n8nio/n8n:latest
    container_name: jobs_n8n
    restart: always
    ports:
      - "5678:5678"
    env_file:
      - .env
    volumes:
      - ./n8n:/home/node/.n8n
    depends_on:
      - postgres

volumes:
  postgres_data: