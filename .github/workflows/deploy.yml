name: AI Job Agent CI

on:
  push:
    branches:
    - main
    - develop

  pull_request:
    branches:
    - main

permissions:
  contents: write

jobs:

  backend-check:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Create output directory
        run: |
          mkdir -p output

      - name: Run AI job pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd backend

          python -c "from ai.scorer import score_job; from ai.resume_generator import generate_resume; from ai.cover_letter import generate_cover_letter; from services.job_writer import save_jobs;"

      - name: Inject sample job
        run: |
          echo '[
            {
              "title": "AI Engineer",
              "company": "OpenAI",
              "url": "https://example.com",
              "description": "Python, LLMs, Kubernetes",
              "score": 95
            }
          ]' > backend/files/jobs.json

      # 7. Run real generation script (IMPORTANT)
      - name: Generate documents
        run: |
          cd backend

          python -c "
            from services.profile_parser import parse_resume;
            from ai.resume_generator import generate_resume;
            from ai.cover_letter import generate_cover_letter;

            profile = parse_resume()

            print('Profile loaded')
            print(profile[:200])
            "

      # 8. Save outputs safely
      - name: Ensure output exists
        run: |
          mkdir -p output

      - name: Commit generated files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add output backend/files/jobs.json

          git diff --cached --quiet || git commit -m "AI job pipeline update"

          git push origin main

      - name: Upload job outputs
        uses: actions/upload-artifact@v4
        with:
          name: ai-job-documents
          path: output/

  docker-build:
    runs-on: ubuntu-latest
    needs: backend-check
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        run: |
          docker build -t ai-job-agent-backend ./backend

      - name: Validate docker-compose
        run: |
          docker compose config
