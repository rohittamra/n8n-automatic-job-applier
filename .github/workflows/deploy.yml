name: AI Job Agent CI

on:
  push:
    branches:
    - main
    - develop

  pull_request:
    branches:
    - main

permissions:
  contents: write

jobs:

  pipeline:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Repository Structure
        run: |
          pwd
          ls -R

      - name: Verify Resume Exists
        run: |
          test -f files/resume.docx
          echo "resume.docx found"

      - name: Create Output Directory
        run: |
          mkdir -p output

      - name: Create Sample Jobs File
        run: |
          mkdir -p files
          cat > files/jobs.json << 'EOF'
          [
            {
              "title": "AI Engineer",
              "company": "OpenAI",
              "url": "https://example.com",
              "description": "Python, LLMs, Kubernetes, AWS"
            },
            {
              "title": "ML Engineer",
              "company": "Example Corp",
              "url": "https://example.com/ml",
              "description": "Machine Learning, Docker, Python"
            }
          ]
          EOF

      - name: Run AI Pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          JOB_SCORE_THRESHOLD: 75
        run: |
          cd backend
          python run_pipeline.py

      - name: Show Generated Files
        run: |
          ls -lah output || true

      - name: Commit Generated Artifacts
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add output
          git add files/jobs.json

          git diff --cached --quiet || git commit -m "AI pipeline output update"

          git push origin HEAD:${GITHUB_REF_NAME}

      - name: Upload Output Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-job-agent-output
          path: output/
  docker-build:

    runs-on: ubuntu-latest
    needs: pipeline

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        run: |
          docker build -t ai-job-agent-backend ./backend

      - name: Validate Docker Compose
        run: |
          docker compose config
