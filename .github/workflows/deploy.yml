name: AI Job Agent CI

on:
  push:
    branches:
    - main
    - develop

  pull_request:
    branches:
    - main

jobs:

  backend-check:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Start API
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd backend
          uvicorn app:app --host 0.0.0.0 --port 8000 &
          sleep 10
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -c "import app"

      - name: Verify imports
        run: |
          python -c "from ai.scorer import score_job"
          python -c "from ai.resume_generator import generate_resume"
          python -c "from ai.cover_letter import generate_cover_letter"

      - name: Check project structure
        run: |
          test -f backend/app.py
          test -f backend/ai/scorer.py
          test -f backend/ai/resume_generator.py
          test -f backend/ai/cover_letter.py

  docker-build:
    runs-on: ubuntu-latest
    needs: backend-check
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        run: |
          docker build -t ai-job-agent-backend ./backend

      - name: Validate docker-compose
        run: |
          docker compose config

  validate-assets:
    runs-on: ubuntu-latest
    needs: backend-check

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Required Files
        run: |
          mkdir -p files
          touch files/jobs.json

          echo "Repository validation complete"
