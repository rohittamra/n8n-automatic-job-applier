name: AI Job Agent CI

on:
  push:
    branches:
    - main
    - develop

  pull_request:
    branches:
    - main

permissions:
  contents: write

jobs:

  backend-check:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Imports
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd backend
          python -c "import app"
          python -c "from ai.scorer import score_job"
          python -c "from ai.resume_generator import generate_resume"
          python -c "from ai.cover_letter import generate_cover_letter"

      - name: Start FastAPI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd backend
          uvicorn app:app --host 0.0.0.0 --port 8000 &
          sleep 10

      - name: Health Check
        run: |
          curl http://localhost:8000/

  docker-build:
    runs-on: ubuntu-latest
    needs: backend-check
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        run: |
          docker build -t ai-job-agent-backend ./backend

      - name: Validate docker-compose
        run: |
          docker compose config

  validate-assets:
    runs-on: ubuntu-latest
    needs: backend-check

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate jobs from backend
        run: |
          curl -X POST http://localhost:8000/jobs/update \
            -H "Content-Type: application/json" \
            -d '[
              {
                "title": "AI Engineer",
                "company": "OpenAI",
                "url": "https://example.com",
                "description": "Python, LLMs",
                "score": 90
              }
            ]'

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add files/jobs.json

          git diff --cached --quiet || git commit -m "update jobs.json"

          git push origin main